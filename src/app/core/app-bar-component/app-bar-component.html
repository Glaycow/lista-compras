<header class="app-bar" role="banner">
  @if(urlBack()) {
    <a class="back-link" [routerLink]="this.urlBack()" aria-label="Voltar">
      <span class="icon" aria-hidden="true">&#8592;</span>
    </a>
  }
  <span class="title" role="heading" aria-level="1">{{title()}}</span>

  <div class="actions" role="toolbar" [attr.aria-label]="'Ações do ' + title()">
    <button
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkMode() ? 'Ativar modo claro' : 'Ativar modo escuro'"
      [attr.title]="isDarkMode() ? 'Modo escuro ativo' : 'Modo claro ativo'"
    >
      @if (isDarkMode()) {
        <span aria-hidden="true">&#9728;&#65039;</span>
      } @else {
        <span aria-hidden="true">&#127769;</span>
      }
    </button>

    @for (button of buttons(); track button.id) {
      <button class="action-btn" (click)="onButtonClick(button)" [attr.aria-label]="button.text">
        <span class="icon" aria-hidden="true">{{ button.icon === '@tui.circle-plus' ? '+' : '&#9998;' }}</span>
      </button>
    }
  </div>
</header>
